<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPACE of Eve</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
 
.photo-item::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(
        to right,
        transparent,
        rgba(255, 255, 255, 0.15),
        transparent
    );
    transform: skewX(-20deg);
    transition: none;
}

.photo-item:hover::after {
    animation: shimmer 0.8s ease forwards;
}

@keyframes shimmer {
    from { left: -100%; }
    to { left: 200%; }
}

.animate-fade-in {
    animation: fade-in 0.3s ease;
}


.animate-fade-in {
    animation: fade-in 0.3s ease;
}

/* 自定义滚动条（便签内） */
#inspiration-list::-webkit-scrollbar {
    width: 4px;
}
#inspiration-list::-webkit-scrollbar-thumb {
    background: rgba(99, 102, 241, 0.3);
    border-radius: 2px;
}

/* ====== 鼠标跟随光晕 ====== */
.cursor-glow {
    position: fixed;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, rgba(99,102,241,0.04) 40%, transparent 70%);
    transform: translate(-50%, -50%);
    transition: opacity 0.3s ease;
    mix-blend-mode: screen;
    filter: blur(20px);
}

/* ====== 宇宙粒子画布 ====== */
.particle-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.7;
}

/* ====== 滚动渐入动画 ====== */
.reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.reveal.active {
    opacity: 1;
    transform: translateY(0);
}

.reveal-left {
    opacity: 0;
    transform: translateX(-40px);
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.reveal-left.active {
    opacity: 1;
    transform: translateX(0);
}

.reveal-right {
    opacity: 0;
    transform: translateX(40px);
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.reveal-right.active {
    opacity: 1;
    transform: translateX(0);
}

.reveal-scale {
    opacity: 0;
    transform: scale(0.92);
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.reveal-scale.active {
    opacity: 1;
    transform: scale(1);
}

/* ====== 轮播区宇宙光效 ====== */
.carousel-universe-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
    height: 120%;
    background: radial-gradient(ellipse at center, rgba(99,102,241,0.15) 0%, rgba(168,85,247,0.08) 30%, transparent 70%);
    pointer-events: none;
    z-index: -1;
    filter: blur(40px);
    animation: nebula-breathe 6s ease-in-out infinite;
}

@keyframes nebula-breathe {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
}

/* ====== 3D 倾斜卡片 ====== */
.carousel-item {
    transform-style: preserve-3d;
    perspective: 1000px;
}

.carousel-item img {
    transform-style: preserve-3d;
    backface-visibility: hidden;
}

/* ====== 地图任务日志 ====== */
.mission-log {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 180px;
    max-height: calc(100% - 24px);
    overflow-y: auto;
    z-index: 500;
    background: rgba(15, 23, 42, 0.75);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(99, 102, 241, 0.2);
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

.mission-log::-webkit-scrollbar {
    width: 3px;
}

.mission-log::-webkit-scrollbar-thumb {
    background: rgba(99, 102, 241, 0.3);
    border-radius: 2px;
}

.mission-log-title {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(99, 102, 241, 0.15);
}

.mission-log-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    cursor: pointer;
    transition: all 0.3s ease;
}

.mission-log-item:last-child {
    border-bottom: none;
}

.mission-log-item:hover {
    transform: translateX(4px);
}

.mission-log-item:hover .mission-log-name {
    color: #c084fc;
}

.mission-log-thumb {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    overflow: hidden;
    border: 1.5px solid rgba(255, 255, 255, 0.6);
    flex-shrink: 0;
}

.mission-log-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.mission-log-info {
    flex: 1;
    min-width: 0;
}

.mission-log-name {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.9);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.3s;
}

.mission-log-count {
    font-size: 9px;
    color: rgba(165, 180, 252, 0.7);
}

/* 地图连线动画 */
.map-constellation-line {
    stroke-dasharray: 8 6;
    animation: dash-flow 2s linear infinite;
}

@keyframes dash-flow {
    to { stroke-dashoffset: -28; }
}

/* ====== 灵感便签升级 ====== */
.inspiration-widget {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 300px;
    z-index: 40;
    border-radius: 20px;
    overflow: hidden;
    background: rgba(15, 23, 42, 0.55);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(99, 102, 241, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    animation: widget-float 5s ease-in-out infinite;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.inspiration-widget:hover {
    transform: translateY(-4px);
    box-shadow: 
        0 25px 70px rgba(0, 0, 0, 0.5),
        0 0 30px rgba(99, 102, 241, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
}

@keyframes widget-float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}

.inspiration-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.inspiration-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.9);
    letter-spacing: 0.05em;
}

.inspiration-title span {
    font-size: 10px;
    color: #c084fc;
    animation: pulse-star 2s ease-in-out infinite;
}

@keyframes pulse-star {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
}

.inspiration-toggle {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    color: rgba(255, 255, 255, 0.5);
    cursor: pointer;
    transition: all 0.3s;
    font-size: 14px;
    line-height: 1;
}

.inspiration-toggle:hover {
    background: rgba(255, 255, 255, 0.08);
    color: white;
}

.inspiration-body {
    padding: 14px 16px;
}

.inspiration-input-wrap {
    position: relative;
    margin-bottom: 12px;
}

.inspiration-input {
    width: 100%;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 10px 36px 10px 14px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.9);
    outline: none;
    transition: all 0.3s;
}

.inspiration-input::placeholder {
    color: rgba(255, 255, 255, 0.3);
}

.inspiration-input:focus {
    border-color: rgba(99, 102, 241, 0.4);
    background: rgba(0, 0, 0, 0.28);
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
}

.inspiration-submit {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 26px;
    height: 26px;
    border-radius: 8px;
    background: linear-gradient(135deg, rgba(99,102,241,0.8), rgba(168,85,247,0.8));
    border: none;
    color: white;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    opacity: 0.8;
}

.inspiration-submit:hover {
    opacity: 1;
    transform: translateY(-50%) scale(1.05);
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
}

.inspiration-list {
    max-height: 180px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.inspiration-list::-webkit-scrollbar {
    width: 3px;
}

.inspiration-list::-webkit-scrollbar-thumb {
    background: rgba(99, 102, 241, 0.25);
    border-radius: 2px;
}

.inspiration-item {
    position: relative;
    padding: 10px 12px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 12px;
    transition: all 0.3s ease;
    animation: item-in 0.4s ease forwards;
}

@keyframes item-in {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

.inspiration-item:hover {
    background: rgba(99, 102, 241, 0.08);
    border-color: rgba(99, 102, 241, 0.15);
    transform: translateX(4px);
}

.inspiration-item-text {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.75);
    line-height: 1.5;
    padding-right: 18px;
}

.inspiration-item-time {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.3);
    margin-top: 6px;
    letter-spacing: 0.05em;
}

.inspiration-item-delete {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 18px;
    height: 18px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255, 255, 255, 0.3);
    font-size: 12px;
    cursor: pointer;
    opacity: 0;
    transition: all 0.3s;
}

.inspiration-item:hover .inspiration-item-delete {
    opacity: 1;
}

.inspiration-item-delete:hover {
    background: rgba(239, 68, 68, 0.15);
    color: rgba(239, 68, 68, 0.8);
}

.inspiration-empty {
    text-align: center;
    padding: 20px 0;
    color: rgba(255, 255, 255, 0.25);
    font-size: 11px;
    font-style: italic;
}

        body {
    font-family: 'Inter', sans-serif;
    color: #e2e8f0;
    overflow-x: hidden;
    position: relative;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
}

html {
    height: -webkit-fill-available;
}

/* 背景层：单独放一个 div 更稳定 */
.bg-layer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('./Sentosa.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: -2;
}

/* 暗色遮罩 */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(10, 14, 39, 0.75);
    z-index: -1;
}


/* 暗色遮罩 */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(5, 8, 20, 0.05);
    z-index: -1;
}

        
        /* 星空背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        /* 照片悬停效果 */
        .photo-item {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            cursor: pointer;
        }
        
        .photo-item:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3);
            z-index: 10;
        }
        
        .photo-item img {
            transition: transform 0.4s ease;
        }
        
        .photo-item:hover img {
            transform: scale(1.1);
        }
        
        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .lightbox.active {
            display: flex;
        }
        
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(99, 102, 241, 0.5);
        }
        
        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .lightbox-close:hover {
            transform: rotate(90deg);
        }
        
        /* 文章列表样式 */
       .article-item {
    transition: all 0.3s ease;
    border-left: 2px solid transparent;
    position: relative;
    overflow: hidden;
}

    .article-item::before {

    .article-item:hover {

    transform: translateX(6px);
    border-left-color: transparent; /* 用伪元素代替 */
}

.article-item:hover::before {
    opacity: 1;
}

        
        /* 地图容器 */
        .map-container {
            background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        
        /* 打卡记录 */
        .check-in-item {
            transition: all 0.3s;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        
        .check-in-item:hover {
            border-color: rgba(99, 102, 241, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
        width: 6px;
    }
    ::-webkit-scrollbar-track {
        background: transparent;
    }
    ::-webkit-scrollbar-thumb {
        background: rgba(99, 102, 241, 0.25);
        border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: rgba(99, 102, 241, 0.5);
    }
        
        /* 玻璃拟态效果 */
        .glass {
    background: rgba(15, 23, 42, 0.25);          /* 更透一点 */
    backdrop-filter: blur(20px) saturate(140%);  /* 增强模糊 */
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid rgba(255, 255, 255, 0.06); /* 更细的边 */
    box-shadow: 
        0 4px 30px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);  /* 顶部内发光 */
}

        
        /* 渐变文字 */
        .gradient-text {
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0.6;  /* 新增：0.7 = 70%不透明，数字越小越透明 */
        }
/* ====== 照片轮播（新增） ====== */

.photo-carousel {
    width: 100%;
    overflow-x: auto;        /* 改成 auto：允许滚动 */
    overflow-y: hidden;
    position: relative;
    padding: 20px 0 80px;
    cursor: grab;
    z-index: 1;
    touch-action: pan-x;      /* iOS 上优先水平滑动 */
    -webkit-overflow-scrolling: touch;  /* iOS 惯性滚动 */
    /* 隐藏滚动条（所有浏览器） */
    scrollbar-width: none;      /* Firefox */
    -ms-overflow-style: none;   /* IE 10+ */
}

/* Chrome/Safari 隐藏滚动条 */
.photo-carousel::-webkit-scrollbar {
    display: none;
}

.photo-carousel:active {
    cursor: grabbing;
}


.carousel-track {
    display: flex;
    gap: 28px;
    padding: 20px 40px;
    width: max-content;  /* 关键：内容撑开，超出容器 */
}

.carousel-item {
    flex-shrink: 0;
    width: 170px;
    height: 230px;
    position: relative;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 16px;
}

.carousel-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    -webkit-box-reflect: below 10px linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.35) 100%);
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    display: block;
}

/* 悬停放大 */
.carousel-item:hover {
    z-index: 10;
}

.carousel-item:hover img {
    transform: scale(1.18);
    box-shadow: 0 20px 50px rgba(99, 102, 241, 0.35);
    border-color: rgba(192, 132, 252, 0.4);
}

/* 点击激活：更大更亮 */
.carousel-item.active img {
    transform: scale(1.25);
    box-shadow: 0 25px 60px rgba(192, 132, 252, 0.5);
    border-color: rgba(192, 132, 252, 0.8);
}

/* 主体网格：移动端单列，桌面端左窄右宽 */
.main-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 2rem;
    align-items: start;
}

.main-grid > section {
    min-width: 0;
    overflow: hidden;
}

@media (min-width: 1024px) {
    .main-grid {
        grid-template-columns: 360px 1fr;
        gap: 1.5rem;
    }
}

        /* ====== 星际地图打卡墙（新增） ====== */

.map-wall {
    width: 100%;
    height: 280px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(99, 102, 241, 0.2);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    position: relative;
}

/* 覆盖 Leaflet 默认样式为宇宙主题 */
.map-wall .leaflet-container {
    background: #0a0e27;
    font-family: 'Inter', sans-serif;
}

/* 地图标记：照片缩略图 */
.map-photo-marker {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid rgba(255, 255, 255, 0.9);
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5), 0 0 0 3px rgba(99, 102, 241, 0.3);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
}

.map-photo-marker:hover {
    transform: scale(1.3) translateY(-4px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), 0 0 0 4px rgba(192, 132, 252, 0.6);
    z-index: 1000 !important;
}

.map-photo-marker img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 数字徽章 */
.map-badge {
    position: absolute;
    top: -8px;
    right: -8px;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    border-radius: 9px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    color: white;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(99, 102, 241, 0.5);
    border: 1.5px solid rgba(255, 255, 255, 0.9);
}

/* 脉冲动画标记 */
.map-pulse {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #6366f1;
    position: relative;
    border: 2px solid white;
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.8);
}

.map-pulse::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;

function addInspiration() {

function toggleWidget() {

        content.style.display = 'block';

    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatTime(date) {
    const h = date.getHours().toString().padStart(2, '0');
    const m = date.getMinutes().toString().padStart(2, '0');
    return `${h}:${m} • universe`;
}

// ====== 鼠标跟随光晕 ======
function initCursorGlow() {
    const glow = document.getElementById('cursor-glow');
    if (!glow) return;
    
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let currentX = mouseX;
    let currentY = mouseY;
    let isMoving = false;
    let timeout;
    
    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        isMoving = true;
        glow.style.opacity = '1';
        clearTimeout(timeout);
        timeout = setTimeout(() => { isMoving = false; }, 100);
    });
    
    function animate() {
        currentX += (mouseX - currentX) * 0.08;
        currentY += (mouseY - currentY) * 0.08;
        glow.style.left = currentX + 'px';
        glow.style.top = currentY + 'px';
        requestAnimationFrame(animate);
    }
    animate();
}

// ====== 宇宙粒子星座系统（照片区） ======
function initPhotoParticles() {
    const canvas = document.getElementById('photo-particles');
    const container = document.getElementById('photo-carousel');
    if (!canvas || !container) return;
    
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animationId;
    let isVisible = true;
    
    function resize() {
        const rect = container.getBoundingClientRect();
        canvas.width = rect.width * window.devicePixelRatio;
        canvas.height = rect.height * window.devicePixelRatio;
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }
    
    class Particle {
        constructor() {
            this.reset();
        }
        
        reset() {
            const rect = container.getBoundingClientRect();
            this.x = Math.random() * rect.width;
            this.y = Math.random() * rect.height;
            this.size = Math.random() * 1.5 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.3;
            this.speedY = (Math.random() - 0.5) * 0.3;
            this.opacity = Math.random() * 0.5 + 0.2;
            this.pulse = Math.random() * Math.PI * 2;
        }
        
        update() {
            const rect = container.getBoundingClientRect();
            this.x += this.speedX;
            this.y += this.speedY;
            this.pulse += 0.02;
            
            if (this.x < 0 || this.x > rect.width) this.speedX *= -1;
            if (this.y < 0 || this.y > rect.height) this.speedY *= -1;
        }
        
        draw() {
            const pulseOpacity = this.opacity * (0.7 + 0.3 * Math.sin(this.pulse));
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(192, 132, 252, ${pulseOpacity})`;
            ctx.fill();
        }
    }
    
    function init() {
        resize();
        const count = Math.min(60, Math.floor(container.getBoundingClientRect().width / 12));
        particles = [];
        for (let i = 0; i < count; i++) {
            particles.push(new Particle());
        }
    }
    
    function drawLines() {
        const maxDistance = 100;
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < maxDistance) {
                    const opacity = (1 - distance / maxDistance) * 0.25;
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(165, 180, 252, ${opacity})`;
                    ctx.lineWidth = 0.6;
                    ctx.stroke();
                }
            }
        }
    }
    
    function animate() {
        if (!isVisible) {
            animationId = requestAnimationFrame(animate);
            return;
        }
        
        const rect = container.getBoundingClientRect();
        ctx.clearRect(0, 0, rect.width, rect.height);
        
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        drawLines();
        
        animationId = requestAnimationFrame(animate);
    }
    
    // 性能优化：不可见时暂停绘制
    const observer = new IntersectionObserver((entries) => {
        isVisible = entries[0].isIntersecting;
    }, { threshold: 0.1 });
    observer.observe(canvas);
    
    window.addEventListener('resize', resize);
    init();
    animate();
}

// ====== 滚动触发动画 ======
function initScrollReveal() {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('active');
                observer.unobserve(entry.target);
            }
        });
    }, {
        threshold: 0.1,
        rootMargin: '0px 0px -50px 0px'
    });
    
    document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale').forEach(el => {
        observer.observe(el);
    });
}

// ====== 3D 倾斜效果（照片卡片） ======
function initTiltEffect() {
    const items = document.querySelectorAll('.carousel-item');
    items.forEach(item => {
        item.addEventListener('mousemove', (e) => {
            const rect = item.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = (y - centerY) / centerY * -12;
            const rotateY = (x - centerX) / centerX * 12;
            
            item.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.08)`;
            item.style.zIndex = '10';
        });
        
        item.addEventListener('mouseleave', () => {
            item.style.transform = '';
            item.style.zIndex = '';
        });
    });
}

function toggleEdit(index) {
    const editArea = document.getElementById(`edit-area-${index}`);
    if (editArea.classList.contains('hidden')) {
        editArea.classList.remove('hidden');
        editArea.classList.add('animate-fade-in');
    } else {
        editArea.classList.add('hidden');
        editArea.classList.remove('animate-fade-in');
    }
}

        // 渲染照片墙
function renderPhotos() {
    const track = document.getElementById('carousel-track');
    const container = document.getElementById('photo-carousel');
    
    // 生成照片
    photos.forEach((photo, index) => {
        const item = document.createElement('div');
        item.className = 'carousel-item';
        item.innerHTML = `<img src="${photo.src}" alt="${photo.title}" loading="lazy" onerror="this.style.opacity='0.3'">`;
        
        // 单击激活放大
        item.addEventListener('click', () => {
            document.querySelectorAll('.carousel-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
        });
        
        // 双击打开 Lightbox
        item.addEventListener('dblclick', () => {
            openLightbox(photo.src);
        });
        
        track.appendChild(item);
    });
    
    // 拖拽滑动逻辑（带惯性和触控）
    let isDown = false;
    let startX;
    let scrollLeft;
    let velocity = 0;
    let lastX = 0;
    let lastTime = 0;
    let rafId = null;
    
    function startDrag(x) {
        isDown = true;
        container.style.cursor = 'grabbing';
        container.classList.add('active');
        startX = x - container.offsetLeft;
        scrollLeft = container.scrollLeft;
        velocity = 0;
        lastX = x;
        lastTime = Date.now();
        if (rafId) cancelAnimationFrame(rafId);
    }
    
    function endDrag() {
        isDown = false;
        container.style.cursor = 'grab';
        container.classList.remove('active');
        
        // 惯性滚动
        if (Math.abs(velocity) > 0.5) {
            function momentum() {
                velocity *= 0.95;
                container.scrollLeft -= velocity;
                if (Math.abs(velocity) > 0.5) {
                    rafId = requestAnimationFrame(momentum);
                }
            }
            momentum();
        }
    }
    
    function moveDrag(x) {
        if (!isDown) return;
        const now = Date.now();
        const dt = now - lastTime;
        if (dt > 0) {
            velocity = (x - lastX) * 0.5;
        }
        lastX = x;
        lastTime = now;
        
        const walk = (x - container.offsetLeft - startX) * 2;
        container.scrollLeft = scrollLeft - walk;
    }
    
    // 鼠标事件
    container.addEventListener('mousedown', (e) => {
        startDrag(e.pageX);
        e.preventDefault();
    });
    
    container.addEventListener('mouseleave', () => {
        if (isDown) endDrag();
    });
    
    container.addEventListener('mouseup', endDrag);
    
    container.addEventListener('mousemove', (e) => {
        if (!isDown) return;
        e.preventDefault();
        moveDrag(e.pageX);
    });
    
    // 触控事件
    container.addEventListener('touchstart', (e) => {
        startDrag(e.touches[0].pageX);
    }, { passive: false });
    
    container.addEventListener('touchend', endDrag);
    
    container.addEventListener('touchmove', (e) => {
        if (!isDown) return;
        e.preventDefault();
        moveDrag(e.touches[0].pageX);
    }, { passive: false });
}
